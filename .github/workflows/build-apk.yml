name: Build Hemayat WebApp APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Resolve Flutter source
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking source..."

          SOURCE_DIR="$RUNNER_TEMP/source"
          mkdir -p "$SOURCE_DIR"

          if [ -f "pubspec.yaml" ]; then
            echo "pubspec.yaml found in repository root."
            rsync -a --exclude='.git' ./ "$SOURCE_DIR/"
          else
            echo "pubspec.yaml not found in root. Searching ZIP files..."

            FOUND=""

            while IFS= read -r ZIP_FILE; do
              echo "Checking ZIP: $ZIP_FILE"

              TEST_DIR="$RUNNER_TEMP/test_zip"
              rm -rf "$TEST_DIR"
              mkdir -p "$TEST_DIR"

              unzip -q "$ZIP_FILE" -d "$TEST_DIR" || true

              PUBSPEC_PATH="$(find "$TEST_DIR" -type f -name "pubspec.yaml" | head -n 1 || true)"

              if [ -n "$PUBSPEC_PATH" ]; then
                FOUND="$ZIP_FILE"
                ROOT_DIR="$(dirname "$PUBSPEC_PATH")"
                echo "Valid Flutter project found inside: $ZIP_FILE"
                echo "Project root: $ROOT_DIR"
                rsync -a "$ROOT_DIR/" "$SOURCE_DIR/"
                break
              else
                echo "No pubspec.yaml inside: $ZIP_FILE"
              fi
            done < <(find . -maxdepth 3 -type f -name "*.zip" | sort)

            if [ -z "$FOUND" ]; then
              echo "No valid Flutter ZIP found."
              exit 1
            fi
          fi

          if [ ! -f "$SOURCE_DIR/pubspec.yaml" ]; then
            echo "Final source does not contain pubspec.yaml."
            exit 1
          fi

          echo "SOURCE_DIR=$SOURCE_DIR" >> "$GITHUB_ENV"

      - name: Create clean Android project
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DIR="$RUNNER_TEMP/hemayat_build"

          flutter create --platforms=android --project-name=hemayat_webapp --org=ir.samanyaar "$BUILD_DIR"

          rsync -a "$SOURCE_DIR/lib/" "$BUILD_DIR/lib/"
          cp "$SOURCE_DIR/pubspec.yaml" "$BUILD_DIR/pubspec.yaml"

          if [ -d "$SOURCE_DIR/assets" ]; then
            rsync -a "$SOURCE_DIR/assets/" "$BUILD_DIR/assets/"
          fi

          if [ -f "$SOURCE_DIR/analysis_options.yaml" ]; then
            cp "$SOURCE_DIR/analysis_options.yaml" "$BUILD_DIR/analysis_options.yaml"
          fi

          echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"

      - name: Patch Android settings
        shell: bash
        run: |
          set -euo pipefail
          cd "$BUILD_DIR"

          python3 <<'PY'
          from pathlib import Path

          app_id = "ir.samanyaar.hemayat"
          old_app_id = "ir.samanyaar.hemayat_webapp"
          app_label = "سامانه‌یار حمایت"

          for file_name in ["android/app/build.gradle.kts", "android/app/build.gradle"]:
              p = Path(file_name)
              if not p.exists():
                  continue

              text = p.read_text(encoding="utf-8")

              text = text.replace(f'namespace = "{old_app_id}"', f'namespace = "{app_id}"')
              text = text.replace(f'applicationId = "{old_app_id}"', f'applicationId = "{app_id}"')
              text = text.replace(f'namespace "{old_app_id}"', f'namespace "{app_id}"')
              text = text.replace(f'applicationId "{old_app_id}"', f'applicationId "{app_id}"')

              text = text.replace("minSdk = flutter.minSdkVersion", "minSdk = 24")
              text = text.replace("minSdkVersion flutter.minSdkVersion", "minSdkVersion 24")

              p.write_text(text, encoding="utf-8")

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")

          if "android.permission.INTERNET" not in text:
              text = text.replace(
                  "<manifest",
                  "<manifest",
                  1
              )
              text = text.replace(
                  ">\n    <application",
                  ">\n    <uses-permission android:name=\"android.permission.INTERNET\" />\n    <uses-permission android:name=\"android.permission.ACCESS_NETWORK_STATE\" />\n    <application",
                  1
              )

          text = text.replace('android:label="hemayat_webapp"', f'android:label="{app_label}"')

          if "android:usesCleartextTraffic" not in text:
              text = text.replace("<application", '<application android:usesCleartextTraffic="false"', 1)

          manifest.write_text(text, encoding="utf-8")
          PY

      - name: Get dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd "$BUILD_DIR"
          flutter pub get

      - name: Analyze project
        shell: bash
        run: |
          set -euo pipefail
          cd "$BUILD_DIR"
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$BUILD_DIR"
          flutter build apk --release --no-shrink

          mkdir -p "$GITHUB_WORKSPACE/release"
          cp build/app/outputs/flutter-apk/app-release.apk "$GITHUB_WORKSPACE/release/hemayat_webapp_v1_release.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hemayat-webapp-v1-release-apk
          path: release/hemayat_webapp_v1_release.apk
