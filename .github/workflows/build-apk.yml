name: Build Hemayat WebApp Signed APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Resolve Flutter source
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking source..."

          SOURCE_DIR="$RUNNER_TEMP/source"
          mkdir -p "$SOURCE_DIR"

          if [ -f "pubspec.yaml" ]; then
            echo "pubspec.yaml found in repository root."
            rsync -a --exclude='.git' ./ "$SOURCE_DIR/"
          else
            echo "pubspec.yaml not found in root. Searching ZIP files..."

            FOUND=""

            while IFS= read -r ZIP_FILE; do
              echo "Checking ZIP: $ZIP_FILE"

              TEST_DIR="$RUNNER_TEMP/test_zip"
              rm -rf "$TEST_DIR"
              mkdir -p "$TEST_DIR"

              unzip -q "$ZIP_FILE" -d "$TEST_DIR" || true

              PUBSPEC_PATH="$(find "$TEST_DIR" -type f -name "pubspec.yaml" | head -n 1 || true)"

              if [ -n "$PUBSPEC_PATH" ]; then
                FOUND="$ZIP_FILE"
                ROOT_DIR="$(dirname "$PUBSPEC_PATH")"
                echo "Valid Flutter project found inside: $ZIP_FILE"
                echo "Project root: $ROOT_DIR"
                rsync -a "$ROOT_DIR/" "$SOURCE_DIR/"
                break
              else
                echo "No pubspec.yaml inside: $ZIP_FILE"
              fi
            done < <(find . -maxdepth 3 -type f -name "*.zip" | sort)

            if [ -z "$FOUND" ]; then
              echo "No valid Flutter ZIP found. Upload hemayat_webapp_v1_6_verified_otp_signed_source.zip or extract it into repository root."
              exit 1
            fi
          fi

          if [ ! -f "$SOURCE_DIR/pubspec.yaml" ]; then
            echo "Final source does not contain pubspec.yaml."
            exit 1
          fi

          echo "SOURCE_DIR=$SOURCE_DIR" >> "$GITHUB_ENV"

      - name: Create clean Android project
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DIR="$RUNNER_TEMP/hemayat_build"

          flutter create --platforms=android --project-name=hemayat --org=ir.samanyaar "$BUILD_DIR"

          rsync -a "$SOURCE_DIR/lib/" "$BUILD_DIR/lib/"
          cp "$SOURCE_DIR/pubspec.yaml" "$BUILD_DIR/pubspec.yaml"

          if [ -d "$SOURCE_DIR/assets" ]; then
            rsync -a "$SOURCE_DIR/assets/" "$BUILD_DIR/assets/"
          fi

          if [ -f "$SOURCE_DIR/analysis_options.yaml" ]; then
            cp "$SOURCE_DIR/analysis_options.yaml" "$BUILD_DIR/analysis_options.yaml"
          fi

          rm -rf "$BUILD_DIR/test"

          echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"

      - name: Patch Android label and permissions
        shell: bash
        run: |
          set -euo pipefail
          cd "$BUILD_DIR"

          python3 <<'PYCODE'
          from pathlib import Path

          app_label = "سامانه‌یار حمایت"

          for file_name in ["android/app/build.gradle.kts", "android/app/build.gradle"]:
              p = Path(file_name)
              if not p.exists():
                  continue

              text = p.read_text(encoding="utf-8")
              text = text.replace("minSdk = flutter.minSdkVersion", "minSdk = 24")
              text = text.replace("minSdkVersion flutter.minSdkVersion", "minSdkVersion 24")
              p.write_text(text, encoding="utf-8")

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")

          if "android.permission.INTERNET" not in text:
              text = text.replace(
                  ">\n    <application",
                  ">\n    <uses-permission android:name=\"android.permission.INTERNET\" />\n    <uses-permission android:name=\"android.permission.ACCESS_NETWORK_STATE\" />\n    <application",
                  1,
              )

          text = text.replace('android:label="hemayat"', f'android:label="{app_label}"')
          text = text.replace('android:label="hemayat_webapp"', f'android:label="{app_label}"')

          if "android:usesCleartextTraffic" not in text:
              text = text.replace("<application", '<application android:usesCleartextTraffic="false"', 1)

          manifest.write_text(text, encoding="utf-8")
          PYCODE

      - name: Prepare release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          cd "$BUILD_DIR"

          SIGNING_READY="false"
          KEYSTORE_PATH="$BUILD_DIR/android/app/gamino-release-key.jks"
          LOCAL_KEYSTORE="$SOURCE_DIR/android_signing/gamino-release-key.jks"
          LOCAL_KEYPROPS="$SOURCE_DIR/android_signing/key.properties"

          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "Decoding keystore from GitHub Secret..."
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            SIGNING_READY="true"
          elif [ -f "$LOCAL_KEYSTORE" ]; then
            echo "Using local keystore from android_signing directory..."
            cp "$LOCAL_KEYSTORE" "$KEYSTORE_PATH"
            SIGNING_READY="true"
          else
            echo "No release keystore found. APK will be built without custom release signing."
          fi

          if [ "$SIGNING_READY" = "true" ]; then
            if [ -f "$LOCAL_KEYPROPS" ]; then
              echo "Loading local key.properties..."
              STORE_PASSWORD="$(grep '^storePassword=' "$LOCAL_KEYPROPS" | cut -d= -f2-)"
              KEY_PASSWORD="$(grep '^keyPassword=' "$LOCAL_KEYPROPS" | cut -d= -f2-)"
              KEY_ALIAS="$(grep '^keyAlias=' "$LOCAL_KEYPROPS" | cut -d= -f2-)"
            else
              STORE_PASSWORD="${ANDROID_KEYSTORE_PASSWORD:-}"
              KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-}"
              KEY_ALIAS="${ANDROID_KEY_ALIAS:-}"
            fi

            if [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_PASSWORD" ] || [ -z "$KEY_ALIAS" ]; then
              echo "Keystore exists, but signing values are missing."
              echo "Add android_signing/key.properties or GitHub Secrets."
              exit 1
            fi

            {
              echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH"
              echo "ANDROID_KEYSTORE_PASSWORD=$STORE_PASSWORD"
              echo "ANDROID_KEY_PASSWORD=$KEY_PASSWORD"
              echo "ANDROID_KEY_ALIAS=$KEY_ALIAS"
              echo "HAS_RELEASE_SIGNING=true"
            } >> "$GITHUB_ENV"

            python3 <<'PYCODE'
          from pathlib import Path

          p = Path("android/app/build.gradle.kts")
          if not p.exists():
              p = Path("android/app/build.gradle")

          text = p.read_text(encoding="utf-8")

          if "System.getenv(\"ANDROID_KEYSTORE_PASSWORD\")" not in text:
              text = text.replace(
                  "android {",
                  '''android {
              signingConfigs {
                  create("release") {
                      storeFile = file(System.getenv("ANDROID_KEYSTORE_PATH"))
                      storePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias = System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword = System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
          ''',
                  1,
              )

          text = text.replace(
              "signingConfig = signingConfigs.getByName(\"debug\")",
              "signingConfig = signingConfigs.getByName(\"release\")",
          )

          if "signingConfig = signingConfigs.getByName(\"release\")" not in text:
              text = text.replace(
                  "buildTypes {\n        release {",
                  "buildTypes {\n        release {\n            signingConfig = signingConfigs.getByName(\"release\")",
                  1,
              )

          p.write_text(text, encoding="utf-8")
          PYCODE
          else
            echo "HAS_RELEASE_SIGNING=false" >> "$GITHUB_ENV"
          fi

      - name: Get dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd "$BUILD_DIR"
          flutter pub get

      - name: Generate launcher icons
        shell: bash
        run: |
          set -euo pipefail
          cd "$BUILD_DIR"
          dart run flutter_launcher_icons

      - name: Analyze project
        shell: bash
        run: |
          set -euo pipefail
          cd "$BUILD_DIR"
          flutter analyze lib --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$BUILD_DIR"
          flutter build apk --release --no-shrink

          mkdir -p "$GITHUB_WORKSPACE/release"
          cp build/app/outputs/flutter-apk/app-release.apk "$GITHUB_WORKSPACE/release/hemayat_webapp_v1_6_verified_otp_release.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hemayat-webapp-v1-6-verified-otp-release-apk
          path: release/hemayat_webapp_v1_6_verified_otp_release.apk
